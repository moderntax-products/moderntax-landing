[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/docs"
  to = "/docs/"
  status = 301

[[redirects]]
  from = "/api/v1/verify"
  to = "/.netlify/functions/verify"
  status = 200

[[redirects]]
  from = "/employment-verify/*"
  to = "/.netlify/functions/employment-verify/:splat"
  status = 200
